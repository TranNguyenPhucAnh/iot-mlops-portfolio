<svg width="900" height="500" viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-gray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#e0a800" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-notify" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#aaa" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" fill="#fafafa" rx="12"/>

  <!-- Title -->
  <text x="450" y="26" text-anchor="middle" font-size="13" font-weight="600" fill="#222">Airflow DAG pipelines — data + ML lifecycle</text>

  <!--
    4 DAGs each 152px wide, gap 20px → total = 4×152 + 3×20 = 668px
    Left offset = (900 - 668) / 2 = 116px
    DAG centers: 116+76=192, 116+172+76=364, 116+344+76=536, 116+516+76=708
    DAG lefts:   116,         288,             460,             632
  -->

  <!-- DAG 1: Bronze — x=116 -->
  <rect x="116" y="44" width="152" height="104" rx="10" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
  <text x="192" y="68" text-anchor="middle" font-size="12" font-weight="600" fill="#633806">Bronze DAG</text>
  <text x="192" y="86" text-anchor="middle" font-size="10" fill="#854F0B">every 10 min</text>
  <text x="192" y="104" text-anchor="middle" font-size="10" fill="#854F0B">SQS → S3 Bronze</text>
  <text x="192" y="120" text-anchor="middle" font-size="10" fill="#854F0B">partitioned Parquet</text>
  <text x="192" y="136" text-anchor="middle" font-size="10" fill="#854F0B">year/month/day/hour</text>

  <line x1="268" y1="96" x2="286" y2="96" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- DAG 2: Silver — x=288 -->
  <rect x="288" y="44" width="152" height="104" rx="10" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
  <text x="364" y="68" text-anchor="middle" font-size="12" font-weight="600" fill="#633806">Silver DAG</text>
  <text x="364" y="86" text-anchor="middle" font-size="10" fill="#854F0B">hourly</text>
  <text x="364" y="104" text-anchor="middle" font-size="10" fill="#854F0B">validate · clean</text>
  <text x="364" y="120" text-anchor="middle" font-size="10" fill="#854F0B">compute IAQ score</text>
  <text x="364" y="136" text-anchor="middle" font-size="10" fill="#854F0B">domain-rule labels</text>

  <line x1="440" y1="96" x2="458" y2="96" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- DAG 3: Training — x=460 -->
  <rect x="460" y="44" width="152" height="104" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text x="536" y="68" text-anchor="middle" font-size="12" font-weight="600" fill="#3C3489">Training DAG</text>
  <text x="536" y="86" text-anchor="middle" font-size="10" fill="#534AB7">daily 02:00 UTC</text>
  <text x="536" y="104" text-anchor="middle" font-size="10" fill="#534AB7">IsolationForest</text>
  <text x="536" y="120" text-anchor="middle" font-size="10" fill="#534AB7">stratified 80/20 split</text>
  <text x="536" y="136" text-anchor="middle" font-size="10" fill="#534AB7">MLflow registry</text>

  <line x1="612" y1="96" x2="630" y2="96" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- DAG 4: Inference — x=632 -->
  <rect x="632" y="44" width="152" height="104" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="708" y="68" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">Inference DAG</text>
  <text x="708" y="86" text-anchor="middle" font-size="10" fill="#0F6E56">every 6 h</text>
  <text x="708" y="104" text-anchor="middle" font-size="10" fill="#0F6E56">batch predict</text>
  <text x="708" y="120" text-anchor="middle" font-size="10" fill="#0F6E56">Gold layer data</text>
  <text x="708" y="136" text-anchor="middle" font-size="10" fill="#0F6E56">scores → S3</text>

  <!-- Synthetic generator: below Bronze DAG, same center x=192 -->
  <rect x="116" y="174" width="152" height="72" rx="10" fill="#fff8e6" stroke="#e0a800" stroke-width="1"/>
  <text x="192" y="196" text-anchor="middle" font-size="12" font-weight="600" fill="#7d5a00">Synthetic gen.</text>
  <text x="192" y="214" text-anchor="middle" font-size="10" fill="#7d5a00">injects edge-case</text>
  <text x="192" y="230" text-anchor="middle" font-size="10" fill="#7d5a00">anomalies → Bronze</text>

  <!-- Synthetic → Bronze: short upward arrow -->
  <line x1="192" y1="174" x2="192" y2="150" stroke="#e0a800" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arr-amber)"/>

  <!-- Training DAG → Registration gate -->
  <line x1="536" y1="148" x2="536" y2="174" stroke="#534AB7" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr-purple)"/>

  <!-- Registration gate: centered on x=536, width=248 → x=412 -->
  <rect x="412" y="176" width="248" height="72" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text x="536" y="198" text-anchor="middle" font-size="12" font-weight="600" fill="#3C3489">Registration gate</text>
  <text x="536" y="216" text-anchor="middle" font-size="10" fill="#534AB7">ROC-AUC ≥ 0.75</text>
  <text x="536" y="232" text-anchor="middle" font-size="10" fill="#534AB7">Precision ≥ 0.60 · Recall ≥ 0.50</text>

  <!-- Pass branch: left from x=452, label on horizontal segment -->
  <path d="M452 248 L372 248 L372 286" fill="none" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="406" y="263" text-anchor="middle" font-size="10" fill="#0F6E56">pass</text>

  <!-- Fail branch: right from x=620, label on horizontal segment -->
  <path d="M620 248 L710 248 L710 286" fill="none" stroke="#888" stroke-width="1.5" marker-end="url(#arr-gray)"/>
  <text x="660" y="263" text-anchor="middle" font-size="10" fill="#888">fail</text>

  <!-- Register → Staging: centered on x=372 -->
  <rect x="282" y="288" width="180" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="372" y="310" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">Register → Staging</text>
  <text x="372" y="326" text-anchor="middle" font-size="10" fill="#0F6E56">manual promote to Prod</text>

  <!-- Skip registration: centered on x=710 -->
  <rect x="620" y="288" width="180" height="52" rx="8" fill="#f0f0f0" stroke="#aaa" stroke-width="1"/>
  <text x="710" y="310" text-anchor="middle" font-size="12" font-weight="600" fill="#555">Skip registration</text>
  <text x="710" y="326" text-anchor="middle" font-size="10" fill="#888">notify · log to MLflow</text>

  <!-- Both → Notification: meet at center x=541 -->
  <path d="M372 340 L372 376 L541 376 L541 390" fill="none" stroke="#aaa" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr-notify)"/>
  <path d="M710 340 L710 376 L541 376" fill="none" stroke="#aaa" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- Notification block: centered on x=541, width=260 → x=411 -->
  <rect x="411" y="392" width="260" height="32" rx="6" fill="#f0f0f0" stroke="#bbb" stroke-width="1"/>
  <text x="541" y="412" text-anchor="middle" font-size="10" fill="#555">Notification · trigger_rule: none_failed</text>
</svg>
